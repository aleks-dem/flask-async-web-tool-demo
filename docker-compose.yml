version: '3.9'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app
    command: ["python", "run.py"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app
    command: ["celery", "-A", "celery_app.celery", "worker", "--loglevel=info"]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
